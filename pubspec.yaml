name: myapp
description: "Bhumi Finance - Professional Microfinance Dashboard"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  path: ^1.9.1
  intl: ^0.20.2
  pdf: ^3.12.0
  printing: ^5.14.3
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# This creates the icons on your phone's home screen
flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/img.jpg"
    icon_size: 256
  image_path: "assets/img.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/font.ttf
    - assets/img.jpg